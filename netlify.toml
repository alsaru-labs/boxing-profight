[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "NEXT_BOXING_AWR_KEY"
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

[functions."api/cron/generate-classes"]
  schedule = "0 0 * * 6" # Todos los sábados a medianoche (00:00)

[[plugins]]
  package = "@netlify/plugin-nextjs"
