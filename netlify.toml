[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "APPWRITE_API_KEY,NEXT_BOXING_AWR_KEY,NEXT_PUBLIC_APPWRITE_PROJECT_ID,NEXT_PUBLIC_DATABASE_ID,NEXT_PUBLIC_APPWRITE_ENDPOINT,NEXT_PUBLIC_VAPID_PUBLIC_KEY"
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

[functions."api/cron/generate-classes"]
  schedule = "0 0 * * 6" # Todos los sábados a medianoche (00:00)

[[plugins]]
  package = "@netlify/plugin-nextjs"
